<main>
  <section class="assistant-card single-face">
    <div class="face-wrap">
      <div class="avatar" [class.listening]="recognizing" [class.thinking]="isThinking" [class.speaking]="isSpeaking"
        role="img" aria-label="Estado de voz del asistente">
        <span class="avatar-antenna" aria-hidden="true"></span>
        <span class="avatar-head" aria-hidden="true">
          <span class="avatar-eye left"></span>
          <span class="avatar-eye right"></span>
          <span class="avatar-mouth"></span>
        </span>
        <span class="avatar-body" aria-hidden="true"></span>
      </div>

      <div class="voice-status" [class.listening]="recognizing" [class.thinking]="isThinking"
        [class.speaking]="isSpeaking" aria-live="polite">
        <span class="status-dot" aria-hidden="true"></span>
        <span>{{ voiceStatusText }}</span>
      </div>

      <div class="mic-card">
        <button class="mic-circle" type="button" (click)="toggleListening()" [attr.aria-label]="micLabel"
          [attr.aria-pressed]="recognizing" [class.active]="recognizing || conversationEnabled"
          [class.thinking]="isThinking" [class.speaking]="isSpeaking">
          <span class="mic-icon" [class.active]="recognizing" [class.speaking]="isSpeaking" aria-hidden="true">
            <span class="mic-stem"></span>
          </span>
        </button>
        <strong class="mic-label">{{ micLabel }}</strong>
        <span class="mic-sub">{{ micHelpText }}</span>
      </div>
    </div>
  </section>
</main>
